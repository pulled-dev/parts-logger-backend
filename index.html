<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Pulled Apart — Parts Logger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      /* Brand colours */
      --bg-primary: #0F0F0F;
      --bg-card: #1A1A1A;
      --bg-elevated: #242424;
      --border: #2E2E2E;
      --text-primary: #FFFFFF;
      --text-secondary: #B8B8B8;
      --text-muted: #6B6B6B;
      --accent-red: #E31E24;
      --accent-red-hover: #FF2730;
      --accent-dim: rgba(227,30,36,0.12);
      --data-yellow: #FFD600;
      --success: #00C853;
      --error: #FF1744;
      --warning: #FFB300;

      /* Legacy aliases (preserve v1 selectors that referenced these) */
      --bg: var(--bg-primary);
      --surface: var(--bg-card);
      --surface2: var(--bg-elevated);
      --accent: var(--accent-red);
      --text: var(--text-primary);
      --muted: var(--text-secondary);
      --dim: var(--text-muted);
      --green: var(--success);
      --yellow: var(--data-yellow);

      /* Typography */
      --display: 'Bebas Neue', sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
      --sans: 'Inter Tight', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
      min-height: 100dvh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Header ────────────────────────────────────────────────────── */
    .header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      height: 64px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 12px;
    }

    .header-logo { display: flex; align-items: center; flex-shrink: 0; }
    .header-logo img { height: 40px; width: auto; display: block; }

    .brand-text {
      font-family: var(--display);
      font-size: 16px;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 4px;
      font-family: var(--display);
      font-size: 13px;
      letter-spacing: 0.12em;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-muted);
      user-select: none;
      transition: all 0.2s;
    }
    .status-badge.live   { border-color: var(--success);     color: var(--success);     background: rgba(0,200,83,0.10); }
    .status-badge.demo   { border-color: var(--data-yellow); color: var(--data-yellow); background: rgba(255,214,0,0.10); }
    .status-badge.error  { border-color: var(--error);       color: var(--error);       background: rgba(255,23,68,0.12); }

    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .status-badge.live .status-dot { animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.25} }

    .icon-btn {
      width: 48px; height: 48px;
      border-radius: 4px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:hover, .icon-btn.active {
      border-color: var(--accent-red);
      color: var(--accent-red);
      background: var(--accent-dim);
    }

    /* ── Main ──────────────────────────────────────────────────────── */
    .main {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 90px;
    }

    /* ── Add Form ──────────────────────────────────────────────────── */
    .add-form {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .form-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.f-part { flex: 1.6; min-width: 140px; }
    .field.f-ref  { flex: 1;   min-width: 110px; }

    .field label {
      font-family: var(--display);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
    }

    input[type="text"] {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: var(--sans);
      font-size: 14px;
      height: 48px;
      padding: 0 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="text"]:focus {
      border-color: var(--accent-red);
      box-shadow: 0 0 0 2px rgba(227,30,36,0.35);
    }
    input[type="text"]::placeholder { color: var(--text-muted); }

    .field.f-part input,
    .field.f-ref input {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .add-btn {
      padding: 0 20px;
      height: 48px;
      background: var(--accent-red);
      border: none;
      border-radius: 4px;
      color: #fff;
      font-family: var(--display);
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-shrink: 0;
      min-width: 120px;
    }
    .add-btn:hover:not(:disabled) { background: var(--accent-red-hover); }
    .add-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.55s linear infinite;
      display: none;
    }
    .add-btn.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Section header ───────────────────────────────────────────── */
    .sec-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      min-height: 48px;
    }
    .sec-label {
      font-family: var(--display);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-secondary);
    }

    /* ── Empty state ──────────────────────────────────────────────── */
    .empty {
      background: var(--bg-card);
      border: 1px dashed var(--border);
      border-radius: 4px;
      padding: 48px 24px;
      text-align: center;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 32px; margin-bottom: 12px; }
    .empty p { font-size: 14px; line-height: 1.6; }

    /* ── Parts list ───────────────────────────────────────────────── */
    .parts-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Part card ────────────────────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px;
      position: relative;
      animation: pop-in 0.18s ease both;
    }
    @keyframes pop-in { from { opacity:0; transform:translateY(-5px); } }
    .card:hover { border-color: #3a3a3a; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      padding-right: 22px;
    }

    .card-id { flex: 1; min-width: 0; }

    .card-pn {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      color: var(--data-yellow);
      letter-spacing: 0.05em;
    }
    .card-ref {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    /* .card-desc defined below with editable styles */

    .card-tags { display: flex; gap: 4px; flex-wrap: wrap; flex-shrink: 0; margin-top: 1px; }

    .tag {
      font-family: var(--display);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .tag-ebay     { background: rgba(59,130,246,0.12);  color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }
    .tag-claude   { background: rgba(168,85,247,0.12);  color: #c084fc; border: 1px solid rgba(168,85,247,0.25); }
    .tag-paint    { background: rgba(234,179,8,0.12);   color: #fbbf24; border: 1px solid rgba(234,179,8,0.25); }
    .tag-mock     { background: rgba(156,163,175,0.1);  color: #9ca3af; border: 1px solid rgba(156,163,175,0.2); }
    .tag-database { background: rgba(34,197,94,0.12);   color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }
    .tag-learned  { background: rgba(234,179,8,0.12);   color: #fbbf24; border: 1px solid rgba(234,179,8,0.25); }

    /* Editable description */
    .card-desc {
      font-size: 14px; color: var(--text-primary); margin-top: 6px;
      cursor: pointer; border-bottom: 1px dashed transparent; transition: border-color 0.15s;
      display: inline-block; max-width: 100%; min-height: 24px;
    }
    .card-desc:hover { border-bottom-color: var(--text-muted); }
    .card-desc-input {
      width: 100%; background: var(--bg-elevated); border: 1px solid var(--accent-red);
      border-radius: 4px; color: var(--text-primary); font-size: 14px;
      padding: 8px 10px; font-family: var(--sans); margin-top: 6px;
      outline: none;
    }
    .save-flash {
      font-family: var(--display);
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--success);
      margin-left: 8px;
    }

    /* BreakerPro historical price */
    .bp-price { font-size: 12px; color: var(--text-secondary); }
    .bp-price strong { color: var(--data-yellow); font-weight: 700; font-family: var(--mono); }

    .confidence-badge {
      font-family: var(--display);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .confidence-badge.high    { background: rgba(34,197,94,0.12);     color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }
    .confidence-badge.medium  { background: rgba(234,179,8,0.12);     color: #fbbf24; border: 1px solid rgba(234,179,8,0.25); }
    .confidence-badge.low     { background: rgba(239,68,68,0.12);    color: #ef4444; border: 1px solid rgba(239,68,68,0.25); }
    .confidence-badge.none    { background: rgba(156,163,175,0.1);    color: #9ca3af; border: 1px solid rgba(156,163,175,0.2); }

    .card-pricing {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .price-grid { display: flex; gap: 14px; }

    .price-cell { display: flex; flex-direction: column; gap: 3px; }
    .price-lbl {
      font-family: var(--display);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }
    .price-val {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .price-val.suggested { color: var(--data-yellow); font-weight: 700; }

    .listing-ct {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      padding-top: 14px;
    }

    .no-price {
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
    }

    .card-details {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      flex-direction: column;
      gap: 6px;
    }
    .card-details.open { display: flex; }
    .detail-row { display: flex; justify-content: space-between; align-items: center; }
    .detail-label { color: var(--dim); }
    .detail-value { font-family: var(--mono); color: var(--text); }

    .your-price-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .yp-label {
      font-family: var(--display);
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      white-space: nowrap;
    }
    .yp-input {
      width: 120px !important;
      height: 40px !important;
      font-family: var(--mono) !important;
      font-size: 14px !important;
      padding: 0 10px !important;
      text-align: right !important;
    }
    .yp-hint { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }

    .remove-btn {
      position: absolute;
      top: 8px; right: 8px;
      width: 32px; height: 32px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
      font-size: 18px;
      line-height: 1;
      transition: all 0.12s;
    }
    .remove-btn:hover {
      background: var(--accent-dim);
      border-color: var(--accent-red);
      color: var(--accent-red);
    }

    /* ── Stats bar ────────────────────────────────────────────────── */
    .stats-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 90;
      flex-wrap: wrap;
    }

    .stats { display: flex; gap: 24px; flex: 1; flex-wrap: wrap; }

    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-lbl {
      font-family: var(--display);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }
    .stat-val { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--text-primary); }
    .stat-val.hi { color: var(--data-yellow); }

    .export-btn {
      min-height: 48px;
      padding: 0 18px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-secondary);
      font-family: var(--display);
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .export-btn:hover {
      border-color: var(--accent-red);
      color: var(--accent-red);
      background: var(--accent-dim);
    }

    /* ── Settings panel ───────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(340px, 100vw);
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      z-index: 201;
      transform: translateX(100%);
      transition: transform 0.22s ease;
      display: flex; flex-direction: column;
    }
    .panel.open { transform: translateX(0); }

    .panel-head {
      height: 64px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title {
      font-family: var(--display);
      font-size: 16px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-primary);
    }

    .panel-body { padding: 24px 20px; display: flex; flex-direction: column; gap: 24px; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    .setting { display: flex; flex-direction: column; gap: 8px; }
    .setting > label {
      font-family: var(--display);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    .setting .hint { font-size: 12px; color: var(--text-muted); margin-top: -2px; }

    .toggle-row { display: flex; align-items: center; justify-content: space-between; min-height: 48px; }
    .toggle-row .tl { font-size: 14px; color: var(--text-primary); }

    .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .track {
      position: absolute; inset: 0;
      border-radius: 4px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s;
    }
    .toggle input:checked + .track {
      background: var(--accent-red);
      border-color: var(--accent-red);
    }
    .thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 18px; height: 18px;
      border-radius: 2px;
      background: #fff;
      transition: left 0.18s;
      pointer-events: none;
    }
    .toggle input:checked ~ .thumb { left: 23px; }

    .save-btn {
      min-height: 48px;
      padding: 0 20px;
      background: var(--accent-red);
      border: none;
      border-radius: 4px;
      color: #fff;
      font-family: var(--display);
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }
    .save-btn:hover { background: var(--accent-red-hover); }

    /* ── Toast ────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 84px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--bg-elevated);
      border: 1px solid var(--error);
      color: var(--error);
      padding: 12px 16px;
      border-radius: 4px;
      font-family: var(--sans);
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      z-index: 400;
      transition: all 0.2s;
      white-space: nowrap;
      max-width: calc(100vw - 32px);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Mode toggle ──────────────────────────────────────────────── */
    .mode-toggle {
      position: sticky;
      top: 64px;
      z-index: 99;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      width: 100%;
    }
    .mode-btn {
      flex: 1;
      min-height: 56px;
      padding: 8px 12px;
      background: transparent;
      border: none;
      border-bottom: 4px solid transparent;
      color: var(--text-muted);
      font-family: var(--display);
      font-size: 16px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .mode-btn + .mode-btn { border-left: 1px solid var(--border); }
    .mode-btn:hover:not(.active) { background: var(--bg-elevated); color: var(--text-secondary); }
    .mode-btn.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent-red);
      background: var(--bg-elevated);
    }
    .mode-btn:focus-visible { outline: 2px solid var(--accent-red); outline-offset: -2px; }

    /* ── Body Panel placeholder ───────────────────────────────────── */
    .placeholder-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 32px 24px;
      text-align: center;
      max-width: 480px;
      margin: 0 auto;
    }
    .placeholder-card h2 {
      font-family: var(--display);
      font-size: 28px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .placeholder-card .subtitle {
      font-family: var(--display);
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--data-yellow);
      margin-bottom: 16px;
    }
    .placeholder-card .body-text {
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    /* ── Body Panel mode flow ─────────────────────────────────────── */
    .bp-step {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
      max-width: 640px;
      margin: 0 auto;
    }
    .bp-step-head {
      display: flex;
      align-items: center;
      gap: 10px;

<!-- Header -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
'use strict';

// ── Config ──────────────────────────────────────────────────────────────────
const DEFAULT_URL = 'https://web-production-7a1f0.up.railway.app';

function loadCfg() {
  try { return JSON.parse(localStorage.getItem('pa_cfg') || '{}'); }
  catch { return {}; }
}
function saveCfg() { localStorage.setItem('pa_cfg', JSON.stringify(cfg)); }

const cfg = Object.assign({ url: DEFAULT_URL, demo: false }, loadCfg());

// ── State ────────────────────────────────────────────────────────────────────
let parts = [];

// ── Persistence ──────────────────────────────────────────────────────────────
function saveParts() {
  try {
    localStorage.setItem('pulledapart_logged_parts', JSON.stringify(parts));
  } catch(e) {
    console.warn('localStorage write failed (storage full?):', e);
  }
}

function loadParts() {
  try {
    const stored = localStorage.getItem('pulledapart_logged_parts');
    if (stored) parts = JSON.parse(stored);
  } catch(e) {
    console.warn('localStorage read failed:', e);
  }
}

// ── DOM ──────────────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const badge      = $('badge');
const badgeText  = $('badge-text');
const pnInput    = $('pn-input');
const refInput   = $('ref-input');
const addBtn     = $('add-btn');
const addLabel   = $('add-label');
const spinner    = addBtn.querySelector('.spinner');
const partsList  = $('parts-list');
const emptyState = $('empty-state');
const clearBtn   = $('clear-btn');
const sTotal     = $('s-total');
const sPriced    = $('s-priced');
const sValue     = $('s-value');
const exportBtn  = $('export-btn');
const overlay    = $('overlay');
const panel      = $('panel');
const settBtn    = $('settings-btn');
const panelClose = $('panel-close');
const sUrl       = $('s-url');
const sDemo      = $('s-demo');
const sSave      = $('s-save');
const toastEl    = $('toast');
const countLabel = $('parts-count-label');

// ── Toast ────────────────────────────────────────────────────────────────────
let toastTmr;
function toast(msg, kind) {
  toastEl.textContent = msg;
  toastEl.classList.remove('success');
  if (kind === 'success') toastEl.classList.add('success');
  toastEl.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => {
    toastEl.classList.remove('show');
    toastEl.classList.remove('success');
  }, 3500);
}

// ── Status check ─────────────────────────────────────────────────────────────
async function checkStatus() {
  if (cfg.demo) { setMode('demo'); return; }
  try {
    const r = await fetch(cfg.url + '/health', { signal: AbortSignal.timeout(6000) });
    if (!r.ok) throw new Error();
    const d = await r.json();
    setMode(d.mode === 'live' ? 'live' : 'demo');
  } catch {
    setMode('error');
  }
}

function setMode(mode) {
  badge.className = 'status-badge ' + mode;
  badgeText.textContent = mode === 'live' ? 'LIVE' : mode === 'demo' ? 'DEMO' : 'ERROR';
}

// ── Paint codes (cached on init for body-panel mode) ─────────────────────────
window.PA_PAINT_CODES = [];
async function loadPaintCodes() {
  try {
    const r = await fetch(cfg.url + '/paint-codes', { signal: AbortSignal.timeout(8000) });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    window.PA_PAINT_CODES = Array.isArray(data) ? data : [];
  } catch (e) {
    console.warn('Paint codes fetch failed:', e);
    window.PA_PAINT_CODES = [];
    toast('Paint codes unavailable — check connection');
  }
}

// ── Lookup ───────────────────────────────────────────────────────────────────
async function lookup(pn) {
  const r = await fetch(cfg.url + '/lookup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ part_number: pn }),
    signal: AbortSignal.timeout(22000),
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.detail || 'Lookup failed (' + r.status + ')');
  }
  return r.json();
}

// ── Add part ─────────────────────────────────────────────────────────────────
async function addPart() {
  const pn  = pnInput.value.trim().toUpperCase();
  const ref = refInput.value.trim();
  if (!pn) { pnInput.focus(); return; }

  addBtn.disabled = true;
  addBtn.classList.add('loading');
  addLabel.textContent = 'Looking up...';

  try {
    const d = await lookup(pn);
    // Pre-fill your_price: BreakerPro historical price first, then eBay suggested
    const prefill = d.breakerpro_price != null ? d.breakerpro_price
                  : d.suggested_price  != null ? d.suggested_price
                  : d.avg_price        != null ? d.avg_price
                  : null;
    parts.unshift({
      id:              Date.now(),
      part_number:     d.part_number,
      description:     d.description,
      avg_price:       d.avg_price,
      median_price:    d.median_price,
      low_price:       d.low_price,
      high_price:      d.high_price,
      suggested_price: d.suggested_price,
      total_listings:  d.total_listings,
      confidence:      d.confidence,
      source:          d.source,
      breakerpro_price: d.breakerpro_price || null,
      vehicle_ref:     ref,
      your_price:      prefill,
    });
    pnInput.value = '';
    saveParts();
    render();
    updateStats();
    pnInput.focus();
    setMode(cfg.demo ? 'demo' : 'live');
  } catch (err) {
    toast('⚠ ' + err.message);
    setMode('error');
  } finally {
    addBtn.disabled = false;
    addBtn.classList.remove('loading');
    addLabel.textContent = 'Add Part';
  }
}

pnInput.addEventListener('keydown',  e => e.key === 'Enter' && addPart());
refInput.addEventListener('keydown', e => e.key === 'Enter' && addPart());
refInput.addEventListener('input', () => {
  try { localStorage.setItem('pulledapart_last_ref', refInput.value); }
  catch(e) { console.warn('localStorage write failed:', e); }
});
addBtn.addEventListener('click', addPart);

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(v) { return v == null ? '&mdash;' : '&pound;' + Number(v).toFixed(2); }

function sourceTags(src) {
  if (!src || src === 'none') return '';
  const t = [];
  const primary = src.split('+')[0];
  if (primary === 'database') t.push('<span class="tag tag-database">DB</span>');
  else if (primary === 'learned') t.push('<span class="tag tag-learned">AI</span>');
  else if (src.includes('claude')) t.push('<span class="tag tag-claude">AI</span>');
  if (src.includes('ebay'))   t.push('<span class="tag tag-ebay">eBay</span>');
  if (src === 'mock')         t.push('<span class="tag tag-mock">Demo</span>');
  return t.join('');
}

function confidenceBadge(conf) {
  if (!conf || conf === 'none') return '';
  return `<span class="confidence-badge ${conf}">${conf.toUpperCase()}</span>`;
}

// ── Editable description ─────────────────────────────────────────────────────
async function sendCorrection(partNumber, newDesc, price) {
  if (!cfg.url) return;
  try {
    await fetch(cfg.url + '/db-correct', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        part_number: partNumber,
        corrected_description: newDesc,
        price: price != null ? parseFloat(price) : null,
      }),
    });
  } catch(e) {
    console.warn('db-correct failed:', e);
  }
}

function startEditDesc(partId) {
  const p = parts.find(x => x.id === partId);
  if (!p) return;
  const card = partsList.querySelector(`[data-id="${partId}"]`);
  if (!card) return;
  const descEl = card.querySelector('.card-desc');
  if (!descEl) return;

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'card-desc-input';
  input.value = p.description;
  descEl.replaceWith(input);
  input.focus();
  input.select();

  async function finish() {
    const newDesc = input.value.trim() || p.description;
    const changed = newDesc !== p.description;

    const newDescEl = document.createElement('div');
    newDescEl.className = 'card-desc';
    newDescEl.textContent = newDesc;
    newDescEl.onclick = () => startEditDesc(partId);
    input.replaceWith(newDescEl);

    if (changed) {
      p.description = newDesc;
      saveParts();
      const flash = document.createElement('span');
      flash.className = 'save-flash';
      flash.textContent = 'Saved \u2713';
      newDescEl.after(flash);
      setTimeout(() => flash.remove(), 2000);
      await sendCorrection(p.part_number, newDesc, p.your_price);
    }
  }

  input.addEventListener('blur', finish, { once: true });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = p.description; input.blur(); }
  });
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  const hasParts = parts.length > 0;
  emptyState.style.display = hasParts ? 'none' : 'block';
  clearBtn.style.display   = hasParts ? 'flex'  : 'none';
  countLabel.textContent   = hasParts ? 'Parts (' + parts.length + ')' : 'Parts';

  partsList.innerHTML = '';

  parts.forEach(p => {
    const hasPricing = p.avg_price != null;
    const isPaint    = !hasPricing && p.total_listings === 0;

    const pricingHtml = hasPricing
      ? `<div class="price-grid">
           <div class="price-cell"><div class="price-lbl">Suggested</div><div class="price-val suggested">${fmt(p.suggested_price)}</div></div>
           <div class="price-cell"><div class="price-lbl">Avg</div><div class="price-val">${fmt(p.avg_price)}</div></div>
           <div class="price-cell"><div class="price-lbl">Median</div><div class="price-val">${fmt(p.median_price)}</div></div>
           <div class="price-cell"><div class="price-lbl">Low</div><div class="price-val">${fmt(p.low_price)}</div></div>
           <div class="price-cell"><div class="price-lbl">High</div><div class="price-val">${fmt(p.high_price)}</div></div>
         </div>
         <div class="listing-ct">${p.total_listings} listing${p.total_listings !== 1 ? 's' : ''}</div>`
      : `<div class="no-price">${isPaint ? 'Paint code — no market pricing' : 'No pricing data'}</div>`;

    const ypVal   = p.your_price != null ? Number(p.your_price).toFixed(2) : '';
    const bpPrice = p.breakerpro_price != null
      ? `<span class="bp-price">Your last: <strong>${fmt(p.breakerpro_price)}</strong></span>` : '';

    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.id = p.id;
    div.innerHTML = `
      <button class="remove-btn" data-rm="${p.id}" title="Remove">×</button>
      <div class="card-top">
        <div class="card-id">
          <div class="card-pn">${esc(p.part_number)}</div>
          ${p.vehicle_ref ? `<div class="card-ref">${esc(p.vehicle_ref)}</div>` : ''}
          <div class="card-desc" title="Tap to correct description">${esc(p.description)}</div>
        </div>
        <div class="card-tags">
          ${sourceTags(p.source)}
          ${confidenceBadge(p.confidence)}
        </div>
      </div>
      <div class="card-pricing">${pricingHtml}${bpPrice}</div>
      <div class="your-price-row">
        <span class="yp-label">Your price</span>
        <input type="text" class="yp-input" data-yp="${p.id}" placeholder="£0.00" value="${esc(ypVal)}">
        ${hasPricing ? `<span class="yp-hint">Suggested: ${fmt(p.suggested_price)}</span>` : ''}
      </div>`;

    // Wire up editable description (after innerHTML is set)
    const descEl = div.querySelector('.card-desc');
    if (descEl) descEl.addEventListener('click', () => startEditDesc(p.id));
    partsList.appendChild(div);
  });
}

// ── Delegated events ──────────────────────────────────────────────────────────
partsList.addEventListener('click', e => {
  const rm = e.target.closest('[data-rm]');
  if (!rm) return;
  parts = parts.filter(p => p.id !== +rm.dataset.rm);
  saveParts();
  render();
  updateStats();
});

partsList.addEventListener('input', e => {
  const inp = e.target.closest('[data-yp]');
  if (!inp) return;
  const p = parts.find(x => x.id === +inp.dataset.yp);
  if (!p) return;
  const raw = inp.value.replace(/[^\d.]/g, '');
  p.your_price = raw ? parseFloat(raw) : null;
  saveParts();
  updateStats();
});

clearBtn.addEventListener('click', () => {
  if (!confirm('Clear all ' + parts.length + ' part' + (parts.length !== 1 ? 's' : '') + '?')) return;
  parts = [];
  localStorage.removeItem('pulledapart_logged_parts');
  localStorage.removeItem('pulledapart_last_ref');
  render();
  updateStats();
});

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const priced = parts.filter(p => p.your_price != null && p.your_price > 0);
  const total  = parts.reduce((a, p) => a + (p.your_price || 0), 0);
  sTotal.textContent  = parts.length;
  sPriced.textContent = priced.length;
  sValue.textContent  = '£' + total.toFixed(2);
}

// ── Export CSV ────────────────────────────────────────────────────────────────
function formatPartNumber(pn) {
  return pn.replace(/(.{3})/g, '$1 ').trim();
}

exportBtn.addEventListener('click', () => {
  if (!parts.length) { toast('No parts to export'); return; }
  const rows = [['Part Number','Part Description','Price','Ref']];
  parts.forEach(p => rows.push([
    /^[A-Z0-9]+$/.test(p.part_number) ? formatPartNumber(p.part_number) : p.part_number,
    p.description,
    p.your_price != null ? p.your_price.toFixed(2) : '',
    p.vehicle_ref || '',
  ]));
  const csv = rows.map(r =>
    r.map(c => {
      const s = String(c);
      return (s.includes(',') || s.includes('"') || s.includes('\n'))
        ? '"' + s.replace(/"/g, '""') + '"' : s;
    }).join(',')
  ).join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' }));
  a.download = 'parts-' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  parts = [];
  localStorage.removeItem('pulledapart_logged_parts');
  localStorage.removeItem('pulledapart_last_ref');
  render();
  updateStats();
});

// ── Settings panel ────────────────────────────────────────────────────────────
function openPanel() {
  sUrl.value   = cfg.url;
  sDemo.checked = cfg.demo;
  panel.classList.add('open');
  overlay.classList.add('open');
  settBtn.classList.add('active');
}
function closePanel() {
  panel.classList.remove('open');
  overlay.classList.remove('open');
  settBtn.classList.remove('active');
}

settBtn.addEventListener('click', openPanel);
panelClose.addEventListener('click', closePanel);
overlay.addEventListener('click', closePanel);

sSave.addEventListener('click', () => {
  cfg.url  = (sUrl.value.trim().replace(/\/$/, '')) || DEFAULT_URL;
  cfg.demo = sDemo.checked;
  saveCfg();
  closePanel();
  checkStatus();
});

// ── Init ──────────────────────────────────────────────────────────────────────
checkStatus();
loadPaintCodes();
loadParts();
try {
  const savedRef = localStorage.getItem('pulledapart_last_ref');
  if (savedRef) refInput.value = savedRef;
} catch(e) { /* ignore */ }
render();
updateStats();
pnInput.focus();

// ── Vehicles overlay ─────────────────────────────────────────────────────────
window.PA_VEHICLES = [];

(function initVehicles(){
  const overlay     = document.getElementById('vehicles-overlay');
  const listView    = document.getElementById('veh-list-view');
  const formView    = document.getElementById('veh-form-view');
  const listStatus  = document.getElementById('veh-list-status');
  const listEl      = document.getElementById('veh-list');
  const searchInput = document.getElementById('veh-search-input');
  const openBtn     = document.getElementById('vehicles-btn');
  const closeBtn    = document.getElementById('veh-close-btn');
  const addBtn      = document.getElementById('veh-add-btn');
  const backBtn     = document.getElementById('veh-form-back-btn');
  const cancelBtn   = document.getElementById('veh-cancel-btn');
  const deleteBtn   = document.getElementById('veh-delete-btn');
  const saveBtn     = document.getElementById('veh-save-btn');
  const form        = document.getElementById('veh-form');
  const formTitle   = document.getElementById('veh-form-title');
  const formError   = document.getElementById('veh-form-error');
  const refField    = document.getElementById('veh-ref-field');
  const fields = {
    vin:           document.getElementById('veh-vin'),
    make:          document.getElementById('veh-make'),
    model:         document.getElementById('veh-model'),
    year_range:    document.getElementById('veh-year'),
    paint_code:    document.getElementById('veh-paint-code'),
    paint_name:    document.getElementById('veh-paint-name'),
    engine_code:   document.getElementById('veh-engine-code'),
    transmission:  document.getElementById('veh-transmission'),
    notes:         document.getElementById('veh-notes'),
  };

  let editingRef = null;       // null = add mode, otherwise the ref being edited
  let listLoaded = false;
  let filterTerm = '';

  function escHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Populate paint code dropdown from window.PA_PAINT_CODES
  function populatePaintDropdown() {
    const sel = fields.paint_code;
    if (!sel) return;
    const current = sel.value;
    sel.innerHTML = '<option value="">— None —</option>';
    const codes = Array.isArray(window.PA_PAINT_CODES) ? window.PA_PAINT_CODES : [];
    // Sort by code for stable order
    const sorted = codes.slice().sort((a,b) => (a.code || '').localeCompare(b.code || ''));
    sorted.forEach(pc => {
      const opt = document.createElement('option');
      opt.value = pc.code;
      opt.textContent = pc.code + (pc.name ? ' — ' + pc.name : '');
      sel.appendChild(opt);
    });
    if (current) sel.value = current;
  }

  async function loadVehicles() {
    listStatus.style.display = 'block';
    listStatus.innerHTML = '<span class="veh-spinner"></span>Loading vehicles...';
    listEl.innerHTML = '';
    try {
      const r = await fetch(cfg.url + '/vehicles', { signal: AbortSignal.timeout(15000) });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      window.PA_VEHICLES = Array.isArray(data) ? data : [];
      listLoaded = true;
      renderList();
    } catch (e) {
      console.warn('loadVehicles failed:', e);
      listStatus.style.display = 'block';
      listStatus.textContent = 'Could not load vehicles. Check connection.';
    }
  }
  // Expose for other features (Body Panel mode in Task 4) to refresh cache.
  window.PA_loadVehicles = loadVehicles;

  function renderList() {
    if (!listLoaded) return;
    const term = filterTerm.trim().toLowerCase();
    const all = window.PA_VEHICLES || [];
    const filtered = !term ? all : all.filter(v => {
      const haystack = [v.ref, v.vin, v.make, v.model, v.paint_name, v.paint_code]
        .map(x => (x || '').toString().toLowerCase()).join(' ');
      return haystack.includes(term);
    });

    listEl.innerHTML = '';
    if (!all.length) {
      listStatus.style.display = 'block';
      listStatus.textContent = 'No vehicles yet — tap + Add';
      return;
    }
    if (!filtered.length) {
      listStatus.style.display = 'block';
      listStatus.textContent = 'No matches for "' + term + '"';
      return;
    }
    listStatus.style.display = 'none';

    const frag = document.createDocumentFragment();
    filtered.forEach(v => {
      const row = document.createElement('div');
      row.className = 'veh-row';
      row.dataset.ref = v.ref;
      const parts = [v.make, v.model].filter(Boolean).join(' ');
      const yr = v.year_range ? ' (' + escHtml(v.year_range) + ')' : '';
      const paint = v.paint_code
        ? '<div class="veh-row-paint">' + escHtml(v.paint_code) + (v.paint_name ? ' · ' + escHtml(v.paint_name) : '') + '</div>'
        : '';
      const headline = v.vin ? escHtml(v.vin) : escHtml(v.ref);
      row.innerHTML =
        '<div class="veh-row-top">' +
          '<div class="veh-row-vrm">' + headline + '</div>' +
          (v.vin ? '<div class="veh-row-ref">' + escHtml(v.ref) + '</div>' : '') +
        '</div>' +
        (parts || yr ? '<div class="veh-row-meta">' + escHtml(parts) + yr + '</div>' : '') +
        paint;
      frag.appendChild(row);
    });
    listEl.appendChild(frag);
  }

  // Switch overlay between list and form views
  function showList() {
    listView.style.display = 'flex';
    formView.style.display = 'none';
    formError.classList.remove('show');
  }
  function renderRefAsInput() {
    refField.innerHTML =
      '<label for="veh-ref-input">Vehicle Ref<span class="req">*</span></label>' +
      '<input type="text" id="veh-ref-input" name="ref" placeholder="e.g. VEH47" required ' +
      'inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">';
    const inp = refField.querySelector('input');
    if (inp) {
      inp.addEventListener('blur', () => { inp.value = inp.value.trim().toUpperCase(); });
    }
  }
  function renderRefAsLocked(value) {
    refField.innerHTML =
      '<label>Vehicle Ref</label>' +
      '<div class="veh-ref-locked">' +
        '<span>' + escHtml(value || '—') + '</span>' +
        '<span class="lock-hint">Read-only</span>' +
      '</div>';
  }

  function showForm(vehicle) {
    populatePaintDropdown();
    formError.classList.remove('show');
    formError.textContent = '';
    if (vehicle) {
      editingRef = vehicle.ref;
      formTitle.textContent = 'Edit Vehicle';
      renderRefAsLocked(vehicle.ref);
      deleteBtn.style.display = 'block';
      // Populate non-ref fields
      Object.keys(fields).forEach(k => {
        const el = fields[k];
        if (!el) return;
        el.value = vehicle[k] == null ? '' : vehicle[k];
      });
    } else {
      editingRef = null;
      formTitle.textContent = 'Add Vehicle';
      renderRefAsInput();
      deleteBtn.style.display = 'none';
      // Reset non-ref fields
      Object.keys(fields).forEach(k => {
        const el = fields[k];
        if (!el) return;
        el.value = '';
      });
    }
    listView.style.display = 'none';
    formView.style.display = 'flex';
    // Scroll form to top
    const fsBody = formView.querySelector('.fs-body');
    if (fsBody) fsBody.scrollTop = 0;
  }

  function openOverlay() {
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    showList();
    if (!listLoaded) {
      loadVehicles();
    } else {
      renderList();
    }
  }
  function closeOverlay() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  // Build payload from form (exclude empty strings → null/omit)
  function gatherPayload(includeRef) {
    const out = {};
    Object.keys(fields).forEach(k => {
      const el = fields[k];
      if (!el) return;
      let v = el.value;
      if (typeof v === 'string') v = v.trim();
      if (v === '') return; // skip empty (server defaults to null)
      if (k === 'vin' || k === 'paint_code' || k === 'engine_code') {
        v = v.toUpperCase();
      }
      out[k] = v;
    });
    if (includeRef) {
      // Add mode only: read ref from the dynamically-rendered input
      const refInp = refField.querySelector('input');
      const refVal = refInp ? refInp.value.trim().toUpperCase() : '';
      if (refVal) out.ref = refVal;
    }
    return out;
  }

  function showFormError(msg) {
    formError.textContent = msg;
    formError.classList.add('show');
    const fsBody = formView.querySelector('.fs-body');
    if (fsBody) fsBody.scrollTop = 0;
  }

  async function submitForm() {
    formError.classList.remove('show');
    saveBtn.disabled = true;
    const isEdit = editingRef != null;
    const originalLabel = saveBtn.textContent;
    saveBtn.textContent = isEdit ? 'Saving...' : 'Adding...';
    try {
      let url, method, payload;
      if (isEdit) {
        url = cfg.url + '/vehicles/' + encodeURIComponent(editingRef);
        method = 'PATCH';
        payload = gatherPayload(false);
      } else {
        url = cfg.url + '/vehicles';
        method = 'POST';
        payload = gatherPayload(true);
        if (!payload.ref) { showFormError('Vehicle Ref is required.'); return; }
        if (!payload.make) { showFormError('Make is required.'); return; }
        if (!payload.model) { showFormError('Model is required.'); return; }
      }
      const r = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        signal: AbortSignal.timeout(15000),
      });
      if (!r.ok) {
        let detail = 'HTTP ' + r.status;
        try {
          const e = await r.json();
          if (e && (e.error || e.detail)) detail = e.error || e.detail;
        } catch {}
        if (r.status === 409) detail = 'A vehicle with that ref already exists.';
        showFormError(detail);
        return;
      }
      // Refresh cached list and return to list view
      await loadVehicles();
      showList();
      toast(isEdit ? 'Vehicle updated' : 'Vehicle added', 'success');
    } catch (e) {
      console.warn('submit vehicle failed:', e);
      showFormError('Network error: ' + (e.message || 'unknown'));
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = originalLabel;
    }
  }

  async function deleteCurrent() {
    if (editingRef == null) return;
    const ref = editingRef;
    if (!confirm('Soft-delete vehicle "' + ref + '"?\n\nIt will be hidden from lists. This action can be reversed by an admin.')) return;
    deleteBtn.disabled = true;
    const originalLabel = deleteBtn.textContent;
    deleteBtn.textContent = 'Deleting...';
    try {
      const r = await fetch(cfg.url + '/vehicles/' + encodeURIComponent(ref), {
        method: 'DELETE',
        signal: AbortSignal.timeout(12000),
      });
      if (!r.ok && r.status !== 204) {
        let detail = 'HTTP ' + r.status;
        try { const e = await r.json(); if (e && (e.error || e.detail)) detail = e.error || e.detail; } catch {}
        showFormError(detail);
        return;
      }
      await loadVehicles();
      showList();
      toast('Vehicle deleted', 'success');
    } catch (e) {
      console.warn('delete vehicle failed:', e);
      showFormError('Network error: ' + (e.message || 'unknown'));
    } finally {
      deleteBtn.disabled = false;
      deleteBtn.textContent = originalLabel;
    }
  }

  // Wiring
  if (openBtn)   openBtn.addEventListener('click', openOverlay);
  if (closeBtn)  closeBtn.addEventListener('click', closeOverlay);
  if (addBtn)    addBtn.addEventListener('click', () => showForm(null));
  if (backBtn)   backBtn.addEventListener('click', showList);
  if (cancelBtn) cancelBtn.addEventListener('click', showList);
  if (deleteBtn) deleteBtn.addEventListener('click', deleteCurrent);
  if (form)      form.addEventListener('submit', e => { e.preventDefault(); submitForm(); });
  if (saveBtn)   saveBtn.addEventListener('click', e => { e.preventDefault(); submitForm(); });

  // Search input → debounced filter
  if (searchInput) {
    let searchTmr;
    searchInput.addEventListener('input', () => {
      filterTerm = searchInput.value;
      clearTimeout(searchTmr);
      searchTmr = setTimeout(renderList, 80);
    });
  }

  // Tap row → edit
  listEl.addEventListener('click', e => {
    const row = e.target.closest('.veh-row');
    if (!row) return;
    const ref = row.dataset.ref;
    const v = (window.PA_VEHICLES || []).find(x => x.ref === ref);
    if (v) showForm(v);
  });

  // Uppercase VIN on blur (ref is uppercased by its own dynamic-input handler)
  if (fields.vin) fields.vin.addEventListener('blur', () => {
    fields.vin.value = fields.vin.value.trim().toUpperCase();
  });

  // Pre-load list in background after init so first overlay open is instant
  // (use a slight delay so we don't compete with /lookup-panel and /health on page load)
  setTimeout(() => { if (!listLoaded) loadVehicles(); }, 300);
})();

// ── Body Panel mode flow ─────────────────────────────────────────────────────
window.PA_BODY_PANEL_CATS = window.PA_BODY_PANEL_CATS || [];

(function initBodyPanel(){
  const step1 = document.getElementById('bp-step1');
  const step2 = document.getElementById('bp-step2');
  const step3 = document.getElementById('bp-step3');
  if (!step1 || !step2 || !step3) return;

  const vehSearch    = document.getElementById('bp-veh-search');
  const vehStatus    = document.getElementById('bp-veh-status');
  const vehList      = document.getElementById('bp-veh-list');
  const catStatus    = document.getElementById('bp-cat-status');
  const catGrid      = document.getElementById('bp-cat-grid');
  const summaryStep2 = document.getElementById('bp-summary-step2');
  const summaryStep3 = document.getElementById('bp-summary-step3');
  const paintRow     = document.getElementById('bp-paint-row');
  const descInput    = document.getElementById('bp-desc-input');
  const priceInput   = document.getElementById('bp-price-input');
  const logBtn       = document.getElementById('bp-log-btn');
  const logLabel     = document.getElementById('bp-log-label');
  const resetBtn     = document.getElementById('bp-reset-btn');
  const step2Back    = document.getElementById('bp-step2-back');
  const step3Back    = document.getElementById('bp-step3-back');

  let selectedVehicle  = null;
  let selectedCategory = null;
  let categoriesLoaded = false;
  let filterTerm       = '';

  function escHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showStep(n) {
    step1.style.display = n === 1 ? '' : 'none';
    step2.style.display = n === 2 ? '' : 'none';
    step3.style.display = n === 3 ? '' : 'none';
  }

  function vehicleHeadline(v) { return v.vin || v.ref || '—'; }
  function vehicleMeta(v) {
    const mm = [v.make, v.model].filter(Boolean).join(' ');
    const yr = v.year_range ? ' (' + v.year_range + ')' : '';
    return (mm + yr).trim();
  }

  function renderVehicleList() {
    // "Most recently added first": cache is populated in backend insertion
    // order; reverse so the most recent records appear at the top.
    const all = (window.PA_VEHICLES || []).slice().reverse();
    const term = filterTerm.trim().toLowerCase();
    const filtered = !term ? all : all.filter(v => {
      const haystack = [v.ref, v.vin, v.make, v.model, v.paint_name, v.paint_code]
        .map(x => (x || '').toString().toLowerCase()).join(' ');
      return haystack.includes(term);
    });

    vehList.innerHTML = '';
    if (!all.length) {
      vehStatus.classList.add('show');
      vehStatus.textContent = 'No vehicles available — add one in the Vehicles overlay first.';
      return;
    }
    if (!filtered.length) {
      vehStatus.classList.add('show');
      vehStatus.textContent = 'No matches for "' + term + '"';
      return;
    }
    vehStatus.classList.remove('show');

    const frag = document.createDocumentFragment();
    filtered.forEach(v => {
      const row = document.createElement('div');
      row.className = 'bp-veh-row';
      row.dataset.ref = v.ref;
      const meta = vehicleMeta(v);
      row.innerHTML =
        '<div class="bp-r-headline">' + escHtml(vehicleHeadline(v)) + '</div>' +
        (meta ? '<div class="bp-r-meta">' + escHtml(meta) + '</div>' : '') +
        '<div class="bp-r-ref">' + escHtml(v.ref) + '</div>';
      frag.appendChild(row);
    });
    vehList.appendChild(frag);
  }

  function renderSummary(target) {
    if (!selectedVehicle) { target.innerHTML = ''; return; }
    const v = selectedVehicle;
    const headline = v.vin || v.ref;
    const meta = vehicleMeta(v);
    const cat = selectedCategory
      ? '<span class="bp-s-cat">' + escHtml(selectedCategory.label) + '</span>'
      : '';
    target.innerHTML =
      '<span class="bp-s-vrm">' + escHtml(headline) + '</span>' +
      (meta ? escHtml(meta) + ' · ' : '') +
      'Ref ' + escHtml(v.ref) +
      cat;
  }

  async function loadCategories() {
    if (categoriesLoaded) return;
    catStatus.classList.add('show');
    catStatus.innerHTML = '<span class="veh-spinner"></span>Loading categories...';
    catGrid.innerHTML = '';
    try {
      const r = await fetch(cfg.url + '/body-panel-categories', { signal: AbortSignal.timeout(10000) });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      window.PA_BODY_PANEL_CATS = Array.isArray(data) ? data : [];
      categoriesLoaded = true;
      renderCategories();
    } catch (e) {
      console.warn('loadCategories failed:', e);
      catStatus.classList.add('show');
      catStatus.textContent = 'Could not load categories. Check connection.';
    }
  }

  function renderCategories() {
    catStatus.classList.remove('show');
    catGrid.innerHTML = '';
    const cats = window.PA_BODY_PANEL_CATS || [];
    const frag = document.createDocumentFragment();
    cats.forEach(c => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'bp-cat-btn';
      btn.dataset.id = c.id;
      btn.textContent = c.label;
      frag.appendChild(btn);
    });
    catGrid.appendChild(frag);
  }

  function buildDefaultDescription() {
    const v = selectedVehicle, c = selectedCategory;
    if (!v || !c) return '';
    const head = [v.year_range, v.make, v.model].filter(Boolean).join(' ').trim();
    const lhs = [head, c.label].filter(Boolean).join(' ').trim();
    const paintCode = v.paint_code ? ' — Paint Code ' + v.paint_code : '';
    const paintName = v.paint_name ? ' ' + v.paint_name : '';
    return lhs + paintCode + paintName;
  }

  function enterStep3() {
    renderSummary(summaryStep3);
    const v = selectedVehicle;
    if (v.paint_code || v.paint_name) {
      paintRow.classList.remove('bp-warn');
      paintRow.innerHTML =
        '<span class="bp-p-label">Paint</span>' +
        (v.paint_code ? '<span class="bp-p-code">' + escHtml(v.paint_code) + '</span>' : '') +
        (v.paint_name ? '<span class="bp-p-name">' + escHtml(v.paint_name) + '</span>' : '');
    } else {
      paintRow.classList.add('bp-warn');
      paintRow.innerHTML =
        '<span class="bp-p-label">Paint</span>' +
        '<span class="bp-p-name">No paint code on file — edit vehicle to add.</span>';
    }
    descInput.value = buildDefaultDescription();
    priceInput.value = '';
    showStep(3);
  }

  async function logPart() {
    const v = selectedVehicle, c = selectedCategory;
    if (!v || !c) return;
    const desc = descInput.value.trim() || buildDefaultDescription();
    const rawPrice = priceInput.value.replace(/[^\d.]/g, '');
    const yourPrice = rawPrice ? parseFloat(rawPrice) : null;

    logBtn.disabled = true;
    logBtn.classList.add('loading');
    logLabel.textContent = 'Logging...';

    try {
      // Body panels don't have meaningful eBay market data via the current
      // /lookup endpoint (it strips spaces + uppercases the description into a
      // single token that always returns 0 listings). Use a lightweight /health
      // ping so the ERROR badge still surfaces on offline, then write the
      // record locally with no_pricing fields. Demo mode skips the ping.
      if (!cfg.demo) {
        try {
          const r = await fetch(cfg.url + '/health', { signal: AbortSignal.timeout(6000) });
          if (!r.ok) throw new Error('Backend unreachable (' + r.status + ')');
        } catch (err) {
          toast('⚠ ' + (err.message || 'Network error'));
          setMode('error');
          return;
        }
      }

      parts.unshift({
        id:               Date.now(),
        part_number:      c.label,
        description:      desc,
        avg_price:        null,
        median_price:     null,
        low_price:        null,
        high_price:       null,
        suggested_price:  null,
        total_listings:   0,
        confidence:       null,
        source:           'body_panel',
        breakerpro_price: null,
        vehicle_ref:      v.ref,
        your_price:       yourPrice,
      });
      saveParts();
      render();
      updateStats();
      setMode(cfg.demo ? 'demo' : 'live');
      toast('Part logged', 'success');
      // Same vehicle, fresh slate for next part: clear category + form, return to step 2.
      clearCategoryAndForm();
      showStep(2);
    } finally {
      logBtn.disabled = false;
      logBtn.classList.remove('loading');
      logLabel.textContent = 'Log Part';
    }
  }

  // Clear category + form fields, keep selected vehicle. Used after a successful
  // log (so user can immediately log the next part on the same car) and by the
  // step-3 "Reset" button.
  function clearCategoryAndForm() {
    selectedCategory = null;
    descInput.value = '';
    priceInput.value = '';
    paintRow.innerHTML = '';
    paintRow.classList.remove('bp-warn');
    summaryStep3.innerHTML = '';
    renderSummary(summaryStep2);
  }

  // Full reset back to step 1: drop vehicle too. Used when entering body-panel
  // mode and when the user taps the step-2 "Change Vehicle" button.
  function reset() {
    selectedVehicle = null;
    selectedCategory = null;
    filterTerm = '';
    if (vehSearch)  vehSearch.value = '';
    descInput.value = '';
    priceInput.value = '';
    paintRow.innerHTML = '';
    paintRow.classList.remove('bp-warn');
    summaryStep2.innerHTML = '';
    summaryStep3.innerHTML = '';
    renderVehicleList();
    showStep(1);
  }

  // Wiring
  if (vehSearch) {
    let tmr;
    vehSearch.addEventListener('input', () => {
      filterTerm = vehSearch.value;
      clearTimeout(tmr);
      tmr = setTimeout(renderVehicleList, 80);
    });
  }

  vehList.addEventListener('click', e => {
    const row = e.target.closest('.bp-veh-row');
    if (!row) return;
    const ref = row.dataset.ref;
    const v = (window.PA_VEHICLES || []).find(x => x.ref === ref);
    if (!v) return;
    selectedVehicle = v;
    renderSummary(summaryStep2);
    showStep(2);
    if (!categoriesLoaded) loadCategories(); else renderCategories();
  });

  catGrid.addEventListener('click', e => {
    const btn = e.target.closest('.bp-cat-btn');
    if (!btn) return;
    const id = btn.dataset.id;
    const c = (window.PA_BODY_PANEL_CATS || []).find(x => x.id === id);
    if (!c) return;
    selectedCategory = c;
    enterStep3();
  });

  // Step-2 "Change Vehicle" button: drop vehicle, go back to step 1.
  step2Back.addEventListener('click', reset);
  // Step-3 back arrow: return to step 2 with everything intact.
  step3Back.addEventListener('click', () => { showStep(2); });
  // Step-3 "Reset" button: keep the vehicle, clear category + form, back to step 2.
  resetBtn.addEventListener('click', () => { clearCategoryAndForm(); showStep(2); });
  logBtn.addEventListener('click', logPart);

  // Hooks invoked by mode toggle
  window.PA_bodyPanelOnEnter = function() {
    reset();
    if ((!window.PA_VEHICLES || !window.PA_VEHICLES.length)
        && typeof window.PA_loadVehicles === 'function') {
      vehStatus.classList.add('show');
      vehStatus.innerHTML = '<span class="veh-spinner"></span>Loading vehicles...';
      Promise.resolve(window.PA_loadVehicles()).then(renderVehicleList).catch(()=>{});
    }
  };
  window.PA_bodyPanelOnLeave = function() { reset(); };

  // Initial render against whatever is already cached
  renderVehicleList();
})();

(function initModeToggle(){
  var btns = document.querySelectorAll('.mode-btn');
  var pn = document.getElementById('mode-part-number');
  var bp = document.getElementById('mode-body-panel');
  if(!btns.length || !pn || !bp) return;
  var currentMode = 'part-number';
  btns.forEach(function(b){
    b.addEventListener('click', function(){
      var mode = b.getAttribute('data-mode');
      if (mode === currentMode) return;
      btns.forEach(function(x){
        x.classList.toggle('active', x === b);
        x.setAttribute('aria-selected', x === b ? 'true' : 'false');
      });
      pn.style.display = (mode === 'part-number') ? '' : 'none';
      bp.style.display = (mode === 'body-panel') ? '' : 'none';
      if (mode === 'body-panel' && typeof window.PA_bodyPanelOnEnter === 'function') {
        window.PA_bodyPanelOnEnter();
      } else if (currentMode === 'body-panel' && typeof window.PA_bodyPanelOnLeave === 'function') {
        window.PA_bodyPanelOnLeave();
      }
      currentMode = mode;
    });
  });
})();
</script>
</body>
</html>
